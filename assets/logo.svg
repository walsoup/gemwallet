<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Shadow -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1E293B" flood-opacity="0.12" />
    </filter>

    <!-- Gradients -->
    <!-- Warm Stone Background Plate -->
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF9" />
      <stop offset="100%" stop-color="#F5F5F4" />
    </linearGradient>

    <!-- Wallet Back Flap: Sage Green to Mint -->
    <linearGradient id="grad-wallet-back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0ECE4" />
      <stop offset="100%" stop-color="#86C3B9" />
    </linearGradient>

    <!-- Wallet Front Flap: Soft Lavender to Purple -->
    <linearGradient id="grad-wallet-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E2FF" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>

    <!-- Card 1: Soft Peach to Coral -->
    <linearGradient id="grad-card-back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEEDD" />
      <stop offset="100%" stop-color="#FFC6B3" />
    </linearGradient>

    <!-- Card 2: Soft Rose Pink -->
    <linearGradient id="grad-card-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF2F8" />
      <stop offset="100%" stop-color="#FBCFE8" />
    </linearGradient>

    <!-- Gem Table Facet: White to Sky Blue -->
    <linearGradient id="grad-gem-table" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>

    <!-- Gem Bottom Center Facet: Mint to Indigo (Iridescent) -->
    <linearGradient id="grad-gem-bottom-center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A7F3D0" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>

    <!-- Gem Left Facet: Light Sky Blue -->
    <linearGradient id="grad-gem-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BAE6FD" />
      <stop offset="100%" stop-color="#C7D2FE" />
    </linearGradient>

    <!-- Gem Right Facet: Light Pink/Cream -->
    <linearGradient id="grad-gem-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" />
      <stop offset="100%" stop-color="#FCE7F3" />
    </linearGradient>
  </defs>

  <!-- Background Plate (Soft rounded square) -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#grad-bg)" filter="url(#soft-shadow)" />

  <!-- Main Wallet and Gem Group -->
  <g id="logo-mark">
    <!-- 1. Wallet Back Body (Sage Green) -->
    <rect x="96" y="166" width="320" height="200" rx="36" fill="url(#grad-wallet-back)" />

    <!-- 2. Card 1 (Back Card - Peach/Coral) -->
    <!-- Card 1 Shadow -->
    <rect x="120" y="100" width="180" height="120" rx="20" fill="#0F172A" opacity="0.04" transform="rotate(-6 256 185) translate(0, 4)" />
    <!-- Card 1 Body -->
    <g transform="rotate(-6 256 185)">
      <rect x="120" y="100" width="180" height="120" rx="20" fill="url(#grad-card-back)" />
      <!-- Minimalist card design -->
      <circle cx="150" cy="130" r="10" fill="#FFFFFF" opacity="0.35" />
      <rect x="172" y="125" width="40" height="8" rx="4" fill="#FFFFFF" opacity="0.3" />
      <rect x="150" y="152" width="80" height="6" rx="3" fill="#FFFFFF" opacity="0.25" />
    </g>

    <!-- 3. Card 2 (Front Card - Rose/Pink) -->
    <!-- Card 2 Shadow -->
    <rect x="212" y="115" width="180" height="120" rx="20" fill="#0F172A" opacity="0.04" transform="rotate(6 256 185) translate(0, 4)" />
    <!-- Card 2 Body -->
    <g transform="rotate(6 256 185)">
      <rect x="212" y="115" width="180" height="120" rx="20" fill="url(#grad-card-front)" />
      <!-- Minimalist card design -->
      <circle cx="352" cy="145" r="10" fill="#FFFFFF" opacity="0.35" />
      <rect x="302" y="140" width="40" height="8" rx="4" fill="#FFFFFF" opacity="0.3" />
      <rect x="232" y="167" width="80" height="6" rx="3" fill="#FFFFFF" opacity="0.25" />
    </g>

    <!-- 4. Front Pocket Shadow (Offset replica of the front pocket path) -->
    <path d="M 96,246 
             C 96,220 116,206 142,206 
             L 200,206 
             C 220,230 292,230 312,206 
             L 370,206 
             C 396,206 416,220 416,246 
             L 416,330 
             C 416,350 400,366 380,366 
             L 132,366 
             C 112,366 96,350 96,330 
             Z" 
          fill="#0F172A" opacity="0.06" transform="translate(0, 5)" />

    <!-- 5. Front Pocket Body (Soft Lavender) -->
    <path d="M 96,246 
             C 96,220 116,206 142,206 
             L 200,206 
             C 220,230 292,230 312,206 
             L 370,206 
             C 396,206 416,220 416,246 
             L 416,330 
             C 416,350 400,366 380,366 
             L 132,366 
             C 112,366 96,350 96,330 
             Z" 
          fill="url(#grad-wallet-front)" />

    <!-- Subtle stitching detail on the front pocket -->
    <path d="M 108,248 
             C 108,228 122,216 142,216 
             L 196,216 
             C 222,242 290,242 316,216 
             L 370,216 
             C 390,216 404,228 404,248 
             L 404,328 
             C 404,342 392,354 378,354 
             L 134,354 
             C 120,354 108,342 108,328 
             Z" 
          fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,6" opacity="0.35" />

    <!-- Subtle Diagonal Shine Overlay on Front Pocket -->
    <path d="M 96,206 L 250,206 L 96,360 Z" fill="#FFFFFF" opacity="0.06" />

    <!-- 6. Gem Shadow/Glow (Soft back-glow) -->
    <polygon points="-25,-35 25,-35 45,-10 0,35 -45,-10" fill="#8B5CF6" opacity="0.12" transform="translate(256, 224) scale(1.2)" />

    <!-- 7. Gem Clasp Assembly (Centered in the dip) -->
    <g transform="translate(256, 220) scale(1.1)">
      <!-- Facet 1: Table -->
      <polygon points="-25,-35 25,-35 25,-10 -25,-10" fill="url(#grad-gem-table)" />
      
      <!-- Facet 2: Left Bezel -->
      <polygon points="-25,-35 -25,-10 -45,-10" fill="url(#grad-gem-left)" />
      
      <!-- Facet 3: Right Bezel -->
      <polygon points="25,-35 25,-10 45,-10" fill="url(#grad-gem-right)" />
      
      <!-- Facet 4: Bottom Center -->
      <polygon points="-25,-10 25,-10 0,35" fill="url(#grad-gem-bottom-center)" />
      
      <!-- Facet 5: Bottom Left -->
      <polygon points="-45,-10 -25,-10 0,35" fill="#7DD3FC" />
      
      <!-- Facet 6: Bottom Right -->
      <polygon points="45,-10 25,-10 0,35" fill="#A7F3D0" />

      <!-- Facet Stroking for pristine vector lines -->
      <polygon points="-25,-35 25,-35 45,-10 0,35 -45,-10" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round" opacity="0.9" />
      <polygon points="-25,-10 25,-10 0,35" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round" opacity="0.75" />
      <line x1="-25" y1="-35" x2="-25" y2="-10" stroke="#FFFFFF" stroke-width="1.2" opacity="0.75" />
      <line x1="25" y1="-35" x2="25" y2="-10" stroke="#FFFFFF" stroke-width="1.2" opacity="0.75" />
    </g>

    <!-- Sparkles and lights -->
    <!-- Sparkle Left -->
    <path d="M 165,140 Q 165,148 157,148 Q 165,148 165,156 Q 165,148 173,148 Q 165,148 165,140 Z" fill="#FFE4E6" opacity="0.85" />
    <!-- Sparkle Right -->
    <path d="M 345,130 Q 345,138 337,138 Q 345,138 345,146 Q 345,138 353,138 Q 345,138 345,130 Z" fill="#FEF08A" opacity="0.85" />
    <!-- Soft dot highlights -->
    <circle cx="315" cy="165" r="2.5" fill="#FFFFFF" opacity="0.7" />
    <circle cx="190" cy="180" r="2.0" fill="#FFFFFF" opacity="0.7" />
  </g>

  <!-- Typography: GemWallet -->
  <text x="256" y="432" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="34" 
        font-weight="800" 
        text-anchor="middle" 
        letter-spacing="1.2">
    <tspan fill="#6D28D9">Gem</tspan><tspan fill="#374151">Wallet</tspan>
  </text>
</svg>
