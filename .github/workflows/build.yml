name: Build Android APK (EAS)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Trigger and wait for APK build
        run: eas build --platform android --profile apk --non-interactive --wait --json > eas-build.json

      - name: Download generated APK
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('eas-build.json','utf8'));const b=Array.isArray(d)?d[0]:d;const u=b?.artifacts?.buildUrl;if(!u){throw new Error('Missing buildUrl in EAS response')}fs.writeFileSync('apk-url.txt',u);"
          curl -L "$(cat apk-url.txt)" -o app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemwallet-android-apk
          path: app-release.apk
