name: Build Android APK (Raw Gradle - Release)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Native Android Code
        run: npx expo prebuild --platform android --clean

      - name: Fix Gradle deprecation warnings
        run: |
          # Disable Jetifier (deprecated in AGP 8.0+; all modern RN packages use AndroidX natively)
          grep -q 'android\.enableJetifier' android/gradle.properties \
            && sed -i 's/android\.enableJetifier=.*/android.enableJetifier=false/' android/gradle.properties \
            || echo "android.enableJetifier=false" >> android/gradle.properties
          # Suppress deprecation-warning summary from third-party plugins (RNGP, AGP internals)
          echo "org.gradle.warning.mode=none" >> android/gradle.properties

      - name: Build Standalone APK (Release)
        run: |
          cd android
          chmod +x gradlew
          export NODE_BINARY=$(which node)
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifact (release)
        uses: actions/upload-artifact@v4
        with:
          name: gemwallet-standalone-apk
          path: android/app/build/outputs/apk/release/*.apk
