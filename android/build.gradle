// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    maven { url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo") }
  }

  configurations.configureEach {
    resolutionStrategy.dependencySubstitution {
      substitute module("org.checkerframework:checker-compat-qual:2.5.5")
        .using module("org.checkerframework:checker-compat-qual:2.5.8")
        .because("2.5.5 is intermittently unavailable; force a resolvable version in CI")
    }
    resolutionStrategy.force "org.checkerframework:checker-compat-qual:2.5.8"
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
