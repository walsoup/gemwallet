name: Build Android APK (Raw Gradle - Release)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Standalone APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease -x lintRelease --stacktrace --no-daemon --max-workers=1

      - name: Upload APK artifact (release)
        uses: actions/upload-artifact@v4
        with:
          name: gemwallet-standalone-apk
          path: android/app/build/outputs/apk/release/*.apk
