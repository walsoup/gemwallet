name: Build Android APK (Raw Gradle - Release)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -alias mykey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=GemWallet, OU=Dev, O=Walsoup, L=Unknown, ST=Unknown, C=MA"

      - name: Build Standalone APK (Release)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -x lintRelease --stacktrace --no-daemon --max-workers=1

      - name: Upload APK artifact (release)
        uses: actions/upload-artifact@v4
        with:
          name: gemwallet-standalone-apk
          path: app/build/outputs/apk/release/*.apk
